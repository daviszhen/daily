# 服务配置
server:
  port: 9871

# 日志配置
log:
  level: "info"
  file: "logs/backend.log"
  console: true
  max_size_mb: 100     # 单文件最大 MB，超过自动轮转
  max_backups: 3       # 保留旧文件数
  max_age_days: 30     # 旧文件最大保留天数

# MOI 平台
moi:
  base_url: "https://freetier-01.cn-hangzhou.cluster.cn-dev.matrixone.tech"
  api_key: "your-api-key"
  catalog_id: 1              # Catalog 目录 ID（"默认" = 1）
  model: "qwen3-max"         # 主模型（可选：qwen-turbo/qwen-plus/qwen3-max）
  fast_model: "qwen3-max"   # 快速模型（意图分类、内容验证）

# MatrixOne 数据库
database:
  host: "freetier-01.cn-hangzhou.cluster.cn-dev.matrixone.tech"
  port: 6001
  user: "019c8469-d3af-75b2-aff3-3771585ba9c6#admin#accountadmin"
  password: "your-password"
  name: "smart_daily"
